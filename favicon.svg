<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8670A"/>
      <stop offset="100%" stop-color="#C04A1B"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Kalasha (round finial at apex) -->
  <circle cx="50" cy="13" r="5.5" fill="#FDF6EC"/>

  <!-- Amalaka (ribbed disc below kalasha) -->
  <ellipse cx="50" cy="21" rx="10" ry="3.8" fill="#FDF6EC"/>

  <!-- Shikhara body — slightly concave Kalinga-style tower -->
  <path d="M50,25 C48.5,31 42,40 41,51 L59,51 C58,40 51.5,31 50,25 Z" fill="#FDF6EC" opacity="0.96"/>

  <!-- Horizontal banding lines (traditional Kalinga chaitya bands) -->
  <line x1="44" y1="32" x2="56" y2="32" stroke="#E8670A" stroke-width="1.2" opacity="0.45"/>
  <line x1="43" y1="38" x2="57" y2="38" stroke="#E8670A" stroke-width="1.2" opacity="0.45"/>
  <line x1="42" y1="45" x2="58" y2="45" stroke="#E8670A" stroke-width="1.2" opacity="0.45"/>

  <!-- Jagati — platform base of temple -->
  <rect x="32" y="51" width="36" height="5.5" rx="2.5" fill="#FDF6EC" opacity="0.88"/>

  <!-- Bowl rim (wide flat thali rim) -->
  <rect x="20" y="64" width="60" height="7.5" rx="3.8" fill="#FDF6EC"/>

  <!-- Bowl body — deep rounded pari shape -->
  <path d="M23,71.5 Q22,93 50,95 Q78,93 77,71.5 Z" fill="#FDF6EC" opacity="0.92"/>

  <!-- Pakhala water surface (turmeric glow inside bowl) -->
  <ellipse cx="50" cy="79" rx="22" ry="6.5" fill="#F5A623" opacity="0.38"/>

  <!-- Rice grain dots (3 grains floating in pakhala water) -->
  <ellipse cx="42" cy="79" rx="3" ry="1.8" fill="#FDF6EC" opacity="0.65"/>
  <ellipse cx="50" cy="82" rx="3" ry="1.8" fill="#FDF6EC" opacity="0.65"/>
  <ellipse cx="58" cy="78" rx="3" ry="1.8" fill="#FDF6EC" opacity="0.65"/>
</svg>
